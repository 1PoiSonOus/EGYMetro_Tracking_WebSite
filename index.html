<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ايجي مترو</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="cairo_metro.css">
</head>
<body>

<div class="wrap">

  <!-- Header -->
  <div class="header">
<div class="metro-icon">
    <img src="Logo/Logo.png" alt="Metro Logo">
</div>
    <h1>ايجي مترو</h1>
    <p>اختار محطة الانطلاق والوصول ونلاقيلك أقصر طريق</p>
    <div class="line-tags">
      <div class="ltag"><div class="ldot" style="background:var(--l1)"></div> خط ١ · حلوان ↔ المرج الجديدة</div>
      <div class="ltag"><div class="ldot" style="background:var(--l2)"></div> خط ٢ · شبرا الخيمة ↔ المنيب</div>
      <div class="ltag"><div class="ldot" style="background:var(--l3)"></div> خط ٣ · عدلي منصور ↔ الكيت كات</div>
    </div>
  </div>

  <!-- Search Card -->
  <div class="card">
    <div class="sel-row">
      <div class="fg">
        <label>🟢 محطة الانطلاق</label>
        <div class="custom-sel" id="from-sel"></div>
      </div>
      <button class="swap-btn" onclick="swap()" title="تبديل">⇄</button>
      <div class="fg">
        <label>🔴 محطة الوصول</label>
        <div class="custom-sel" id="to-sel"></div>
      </div>
    </div>
    <button class="go-btn" onclick="go()">🔍 ابحث عن المسار</button>
  </div>

  <!-- Result -->
  <div id="result"></div>

</div>

<script src="cairo_metro.js"></script>
</body>
</html>
